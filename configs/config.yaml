# Saerix Finance 7B RAG Configuration

inference:
  ollama_model: "saerix-finance-7b"
  ollama_model_fallback: "hf.co/Saerix/saerix-finance-7b:Q4_K_M"
  temperature: 0.1
  top_p: 0.5
  num_predict: 400
  repeat_penalty: 1.1

rag:
